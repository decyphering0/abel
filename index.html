<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abel Chat</title>

<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: #e5e5e5;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
  }

  .user {
    background: #3a3f47;
    align-self: flex-end;
  }

  .bot {
    background: #1e1e1e;
    border-left: 3px solid #6ab0ff;
    align-self: flex-start;
  }

  #input-area {
    display: flex;
    padding: 10px;
    background: #111;
    gap: 10px;
  }

  #text {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: #fff;
  }

  #send {
    padding: 10px 16px;
    background: #6ab0ff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #000;
    font-weight: bold;
  }

  #image {
    display: none;
  }

  #attach {
    padding: 10px 16px;
    background: #444;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
  }
</style>
</head>

<body>

<div id="chat"></div>

<div id="input-area">
  <input id="text" placeholder="Message Abel..." />
  <button id="attach">📎</button>
  <input type="file" id="image" accept="image/*" />
  <button id="send">Send</button>
</div>

<script>
const WORKER_BASE = "https://chatter.cypher1010.workers.dev";

const chat = document.getElementById("chat");
const textInput = document.getElementById("text");
const sendBtn = document.getElementById("send");
const attachBtn = document.getElementById("attach");
const imageInput = document.getElementById("image");

function addMessage(content, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

attachBtn.onclick = () => imageInput.click();

sendBtn.onclick = async () => {
  const text = textInput.value.trim();
  const file = imageInput.files[0];

  if (!text && !file) return;

  addMessage(text || "[Image]", "user");

  textInput.value = "";
  imageInput.value = "";

  let endpoint = "/text";
  let payload = { messages: [{ role: "user", content: text }] };

  if (file) {
    endpoint = "/vision";
    const base64 = await fileToBase64(file);
    payload.image = base64;
  }

  try {
    const res = await fetch(WORKER_BASE + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    const reply =
      data?.choices?.[0]?.message?.content ||
      data?.message?.content ||
      JSON.stringify(data);

    addMessage(reply, "bot");
  } catch (err) {
    addMessage("Error: " + err, "bot");
  }
};

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () =>
      resolve(reader.result.replace(/^data:.+;base64,/, ""));
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
