<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abel — Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #0d0d0f;
    --panel: #111118;
    --user: #3a3f5a;
    --bot: #1e1f29;
    --accent: #4a5cff;
    --text: #e6e6e6;
    --subtle: #9a9a9a;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #header {
    padding: 16px;
    background: var(--panel);
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #1b1b22;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 15px;
    white-space: pre-wrap;
  }

  .user {
    background: var(--user);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .bot {
    background: var(--bot);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  #typing {
    font-size: 14px;
    color: var(--subtle);
    padding-left: 4px;
    display: none;
  }

  #inputBar {
    display: flex;
    padding: 12px;
    background: var(--panel);
    border-top: 1px solid #1b1b22;
  }

  #message {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1a1a22;
    color: var(--text);
    font-size: 15px;
  }

  #send {
    margin-left: 10px;
    padding: 12px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.15s;
  }

  #send:hover {
    opacity: 0.85;
  }
</style>
</head>

<body>

<div id="header">Abel</div>

<div id="chat"></div>
<div id="typing">Abel is thinking…</div>

<div id="inputBar">
  <input id="message" placeholder="Say something…" autocomplete="off">
  <button id="send">Send</button>
</div>

<script>
const WORKER_URL = "https://chatter.cypher1010.workers.dev/";
const chat = document.getElementById("chat");
const input = document.getElementById("message");
const send = document.getElementById("send");
const typing = document.getElementById("typing");

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  typing.style.display = "block";

  const payload = {
    messages: [{ role: "user", content: text }]
  };

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    typing.style.display = "none";

    const reply =
      data?.result?.response ||
      data?.result?.output_text ||
      data?.result?.choices?.[0]?.message?.content ||
      "No response";

    addMessage(reply, "bot");

  } catch (err) {
    typing.style.display = "none";
    addMessage("Error: " + err.toString(), "bot");
  }
}

send.onclick = sendMessage;

input.onkeydown = e => {
  if (e.key === "Enter") sendMessage();
};
</script>

</body>
</html>
